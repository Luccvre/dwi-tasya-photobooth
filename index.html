<!DOCTYPE html>
<html>
<head>
  <title>Photobooth</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #05eeb7;
    }

    video {
      transform: scaleX(-1);
    }

    video, canvas {
      border-radius: 10px;
      margin: 10px;
    }

    canvas {
      border-radius: 15px;
      margin-bottom: 30px;
    }

    #countdown {
      font-size: 50px;
      color: #ff1493;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: gray;
    }

    #download {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>Photobooth dwi & tasya 💕</h1>

  <!-- 🔽 COUNTDOWN -->
  <h2 id="countdown"></h2>

  <video id="video" width="300" autoplay></video><br><br>

  <button onclick="takePhoto()">Ambil Foto</button>

  <br><br>
  <canvas id="canvas" width="300" height="1360"></canvas>

  <br>
  <a id="download" href="#">Download foto</a>

  <script>
    const video = document.getElementById('video');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        alert("Kamera tidak bisa diakses!");
      });

    function takePhoto() {
      let photoCount = 0;
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const display = document.getElementById('countdown');

      const spacing = 20;
      const padding = 20;

      // background pink
      ctx.fillStyle = "#ffc0cb";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      function startCountdown() {
        let count = 3;
        display.innerText = count;

        const timer = setInterval(() => {
          count--;

          if (count > 0) {
            display.innerText = count;
          } else if (count === 0) {
            display.innerText = "📸";
          } else {
            clearInterval(timer);
            display.innerText = "";

            // ambil foto setelah countdown
            const y = photoCount * (300 + spacing);

            ctx.fillStyle = "white";
            ctx.fillRect(padding, y + padding, 260, 260);

            ctx.drawImage(video, padding, y + padding, 260, 260);

            photoCount++;

            if (photoCount < 4) {
              setTimeout(startCountdown, 800); // jeda antar foto
            } else {
              display.innerText = "Selesai!";
            }
          }
        }, 1000);
      }

      startCountdown();
    }

    window.onload = function() {
      document.getElementById('download').onclick = function() {
        const canvas = document.getElementById('canvas');
        const link = canvas.toDataURL("image/png");
        this.href = link;
        this.download = "photobooth.png";
      };
    };
  </script>

</body>
</html>
